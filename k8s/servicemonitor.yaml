apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: llmesh-router
  namespace: monitoring
  labels:
    release: monitoring
spec:
  namespaceSelector:
    matchNames:
    - llmesh
  selector:
    matchLabels:
      app: llmesh-router
  endpoints:
  - port: http
    path: /metrics
    interval: 15s
