apiVersion: apps/v1
kind: Deployment
metadata:
  name: ollama
  namespace: llmesh
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ollama
  template:
    metadata:
      labels:
        app: ollama
    spec:
      containers:
      - name: ollama
        image: llmesh-ollama:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 11434
        resources:
          requests:
            memory: "4Gi"
            cpu: "1"
          limits:
            memory: "5Gi"
            cpu: "2"
        readinessProbe:
          httpGet:
            path: /api/tags
            port: 11434
          initialDelaySeconds: 30
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: ollama
  namespace: llmesh
spec:
  selector:
    app: ollama
  ports:
  - port: 11434
    targetPort: 11434
  clusterIP: None  # Headless service for direct pod access
