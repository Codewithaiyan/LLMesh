apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: llmesh-router-hpa
  namespace: llmesh
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: llmesh-router
  minReplicas: 1
  maxReplicas: 4
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 50
